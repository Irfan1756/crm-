<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        header{
            background:#1976d2;
            color:white;
            padding:20px;
            text-align:center;
        }

        h1{
            margin-bottom:10px;
        }

        .container{
            width:90%;
            max-width:1000px;
            margin:40px auto;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:25px;
        }

        .card{
            background:white;
            border-radius:10px;
            padding:30px;
            text-align:center;
            box-shadow:0 3px 10px rgba(0,0,0,.2);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card h2{
            margin-bottom:20px;
            color:#333;
        }

        .card a{
            display:inline-block;
            text-decoration:none;
            background:#1976d2;
            color:white;
            padding:10px 20px;
            border-radius:5px;
        }

        .card a:hover{
            background:#125ea9;
        }

        footer{
            margin-top:50px;
            text-align:center;
            color:gray;
            padding:20px;
        }
    </style>

</head>

<body>

<header>
    <h1>CRM Management System</h1>
    <p>Select a module</p>
</header>

<div class="container">

    <div class="cards">

        <div class="card">
            <h2>Customers</h2>
            <a href="customers.html">Open</a>
        </div>

        <div class="card">
            <h2>Contacts</h2>
            <a href="contacts.html">Open</a>
        </div>

        <div class="card">
            <h2>Leads</h2>
            <a href="leads.html">Open</a>
        </div>

        <div class="card">
            <h2>Tasks</h2>
            <a href="tasks.html">Open</a>
        </div>

        <div class="card">
            <h2>followUps</h2>
            <a href="followUps.html">Open</a>
        </div>

        <div class="card">
            <h2>notes</h2>
            <a href="notes.html">Open</a>
        </div>

        <div class="card">
            <h2>notes</h2>
            <a href="user.html">Open</a>
        </div>
    </div>

</div>

<a href="/customers.html">Customers</a>

<a href="/contacts.html">Contacts</a>

<a href="/leads.html">Leads</a>

<a href="/followUps.html">FollowUps</a>

<a href="/notes.html">Notes</a>

<a href="task.html">Tasks</a>

<a href="user.html">User</a>

<footer>
    CRM Management System © 2026
</footer>

</body>
</html>
