<!DOCTYPE html>

<html>

<head>

    <title>CRM Dashboard</title>

</head>


<body>


<h1>
    CRM Dashboard
</h1>


<h2>
    Welcome User
</h2>


<button onclick="logout()">
    Logout
</button>



<script>


    const token =
    localStorage.getItem("token");



    if(!token){

        window.location.href="login.html";

    }



    function logout(){


    localStorage.removeItem("token");


    window.location.href="login.html";


    }


</script>


</body>

</html>
