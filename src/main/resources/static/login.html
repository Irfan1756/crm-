<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CRM Login</title>


    <style>

        body {

            font-family: Arial, sans-serif;
            background: #f2f2f2;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;

        }


        .container {

            background: white;

            width: 350px;

            padding: 25px;

            border-radius: 10px;

            box-shadow: 0 0 10px rgba(0,0,0,0.2);

        }


        h2 {

            text-align: center;

        }


        label {

            font-weight: bold;

            display: block;

            margin-top: 10px;

        }


        input {


            width:100%;

            padding:10px;

            margin-top:5px;

            border:1px solid #ccc;

            border-radius:5px;

        }


        button {


            width:100%;

            padding:10px;

            margin-top:20px;


            background:#007bff;

            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;

        }


        button:hover {

            background:#0056b3;

        }


        #error {

            color:red;

            text-align:center;

            margin-top:10px;

        }


    </style>

</head>


<body>


<div class="container">


    <h2>CRM Login</h2>


    <form id="loginForm">


        <label>
            Username
        </label>

        <input
                type="text"
                id="username"
                required>



        <label>
            Password
        </label>

        <input
                type="password"
                id="password"
                required>



        <button type="submit">
            Login
        </button>


        <p id="error"></p>


    </form>


</div>



<script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {

        e.preventDefault();

        const loginData = {
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        };

        fetch("http://localhost:8080/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(loginData)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Invalid username or password");
            }
            return response.json();
        })
        .then(data => {
            localStorage.setItem("token", data.token);
            alert("Login Successful");

            // Redirect to dashboard
            window.location.href = "/";
        })
        .catch(error => {
            document.getElementById("error").innerText = error.message;
        });

    });
</script>


</body>

</html>
